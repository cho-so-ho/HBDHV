<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>password 2026</title>
    <style>
        body {
            text-align: center;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            margin: 0;
            padding-top: 80px; 
            background-color: #fff;
            color: #000;
        }

        h1 {
            font-size: 20px;
            font-weight: normal;
            margin-bottom: 40px;
            word-break: keep-all;
        }

        .content-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        /* 검은 사각형 */
        #origami-box {
            width: 250px;
            height: 250px;
            background-color: #000;
            display: flex;
            flex-direction: column; 
            justify-content: center;
            align-items: center;
            transition: all 0.5s;
            overflow: hidden;
            position: relative;
        }

        /* 사진 비율 유지 */
        #eel-image {
            display: none;
            max-width: 100%;
            max-height: 85%;
            width: auto;
            height: auto;
            object-fit: contain;
            margin-bottom: 5px;
        }

        /* 사진 밑 작고 깔끔한 검은 글씨 */
        #success-text {
            display: none;
            color: #000;
            font-size: 13px;
            font-weight: normal;
            margin-top: 5px;
        }

        /* [수정] 입력창과 버튼 스타일 */
        input[type="text"] {
            padding: 10px;
            font-size: 16px;
            width: 200px;
            text-align: center;
            border: 1px solid #ccc;
            margin-bottom: 10px;
        }

        input[type="submit"] {
            padding: 5px 15px;
            font-size: 14px;
            cursor: pointer;
            background-color: #efefef;
            border: 1px solid #767676;
        }

        form {
            margin-top: 10px;
        }
    </style>

    <script>
        function passcheck() {
            var answer = document.getElementById("answer_input").value;
            var box = document.getElementById("origami-box");
            var img = document.getElementById("eel-image");
            var txt = document.getElementById("success-text");
            var form = document.getElementById("pass-form");
            
            if (answer === "풍선장어") {
                // 정답 시 입력 폼 숨기기
                form.style.display = "none";
                
                // 상자를 흰색으로 바꾸고 사진과 텍스트 노출
                box.style.backgroundColor = "#fff"; 
                img.style.display = "block";
                txt.style.display = "block";

                // 2.5초 후 이동
                setTimeout(function() {
                    location.href = "letter 2026.html";
                }, 1250);

                return false; 
            } else {
                // [요청] 틀렸을 때 메시지 수정
                alert("푸쉬ㅣ시시시ㅣㅅ...");
                return false;
            }
        }
    </script>
</head>
<body>

    <h1>검은 색종이로 접었던 물고기 이름은?</h1>

    <div class="content-area">
        <div id="origami-box">
            <img src="풍선장어.jpg" id="eel-image" alt="풍선장어">
            <div id="success-text">풍선장어!</div>
        </div>

        <form id="pass-form" onsubmit="return passcheck()">
            <input type="text" required id="answer_input" placeholder="답을 입력하세요" autocomplete="off">
            <div>
                <input type="submit" value="완성!">
            </div>
        </form>
    </div>

</body>
</html>
